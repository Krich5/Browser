<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grandpa Music</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      background: #f4f4f4;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .track {
      font-size: 22px;
      margin-bottom: 30px;
      color: #444;
    }

    button {
      font-size: 28px;
      padding: 20px 40px;
      cursor: pointer;
    }

    /* Hide video visually (audio-style mode) */
    #player {
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <h1>Music Player</h1>
  <div class="track">Now Playing:<br><strong>Track Name Here</strong></div>

  <button onclick="togglePlay()">Play / Pause</button>

  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let player;
    let isPlaying = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: "5dnktss4Vow",
        playerVars: {
          autoplay: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onReady: function(event) {
            event.target.playVideo();
            isPlaying = true;
          },
          onStateChange: function(event) {
            // Loop when finished
            if (event.data === YT.PlayerState.ENDED) {
              player.playVideo();
            }
          }
        }
      });
    }

    function togglePlay() {
      if (!player) return;

      if (isPlaying) {
        player.pauseVideo();
        isPlaying = false;
      } else {
        player.playVideo();
        isPlaying = true;
      }
    }
  </script>

</body>
</html>
