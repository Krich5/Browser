<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grandpa Music</title>

  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px 16px; background: #f4f4f4; }
    h1 { font-size: 40px; margin: 0 0 10px; }
    #title { font-size: 24px; margin: 10px 0 20px; color: #333; }
    #counter { font-size: 18px; margin: 0 0 30px; color: #666; }
    button { font-size: 28px; padding: 18px 26px; margin: 6px; cursor: pointer; }
    #player { width: 1px; height: 1px; overflow: hidden; } /* “audio-only feel” */
  </style>
</head>

<body>
  <h1>Music</h1>
  <div id="title">Loading…</div>
  <div id="counter"></div>

  <div>
    <button onclick="prev()">⏮ Prev</button>
    <button onclick="togglePlay()">▶️ / ⏸</button>
    <button onclick="next()">⏭ Next</button>
  </div>

  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ✅ EDIT THIS LIST ONLY (order here = play order)
    const tracks = [
      { id: "5dnktss4Vow", title: "Track 1 (replace with real title)" },
      { id: "pE1QYlATnGo", title: "Track 2 (replace with real title)" },
      // { id: "VIDEO_ID_HERE", title: "Another Track Name" },
    ];

    let index = 0;
    let player;
    let isPlaying = false;

    const titleEl = document.getElementById("title");
    const counterEl = document.getElementById("counter");

    function renderNowPlaying() {
      const t = tracks[index];
      titleEl.innerHTML = `Now Playing:<br><strong>${escapeHtml(t.title)}</strong>`;
      counterEl.textContent = `Track ${index + 1} of ${tracks.length}`;
      document.title = `Music - ${t.title}`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[m]));
    }

    function onYouTubeIframeAPIReady() {
      renderNowPlaying();

      player = new YT.Player("player", {
        videoId: tracks[index].id,
        playerVars: {
          autoplay: 1,
          controls: 0,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onReady: () => { player.playVideo(); isPlaying = true; },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED) {
              next(); // auto-advance
            }
          }
        }
      });
    }

    function loadCurrent(autoplay = true) {
      if (!player) return;
      renderNowPlaying();
      player.loadVideoById(tracks[index].id);
      if (!autoplay) player.pauseVideo();
      isPlaying = autoplay;
    }

    function next() {
      index = (index + 1) % tracks.length;
      loadCurrent(true);
    }

    function prev() {
      index = (index - 1 + tracks.length) % tracks.length;
      loadCurrent(true);
    }

    function togglePlay() {
      if (!player) return;
      if (isPlaying) {
        player.pauseVideo();
        isPlaying = false;
      } else {
        player.playVideo();
        isPlaying = true;
      }
    }
  </script>
</body>
</html>
