<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grandpa Music</title>
  <style>
    body { font-family: system-ui, Arial; margin: 20px; }
    button { font-size: 22px; padding: 14px 18px; margin: 6px 6px 6px 0; }
    .now { font-size: 20px; margin-top: 12px; }
    /* Make the video tiny so it’s basically “audio-only feel” */
    #player { width: 1px; height: 1px; overflow: hidden; }
  </style>
</head>
<body>
  <h1>Music</h1>

  <div>
    <button onclick="prev()">⏮ Prev</button>
    <button onclick="togglePlay()">▶️/⏸</button>
    <button onclick="next()">⏭ Next</button>
  </div>

  <div class="now" id="nowPlaying">Loading…</div>
  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // Put your video IDs here (from https://www.youtube.com/watch?v=VIDEO_ID)
    const playlist = [
      "dQw4w9WgXcQ",
      "kJQP7kiw5Fk",
      "3JZ_D3ELwOQ"
    ];

    let index = 0;
    let player;
    let isPlaying = false;

    function updateNowPlaying() {
      document.getElementById("nowPlaying").textContent =
        `Track ${index + 1} of ${playlist.length}`;
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: playlist[index],
        playerVars: { autoplay: 1, controls: 0, rel: 0 },
        events: {
          onReady: () => { updateNowPlaying(); player.playVideo(); isPlaying = true; },
          onStateChange: (e) => {
            // When a track ends, go next
            if (e.data === YT.PlayerState.ENDED) next();
          }
        }
      });
    }

    function loadCurrent() {
      if (!player) return;
      player.loadVideoById(playlist[index]);
      updateNowPlaying();
      isPlaying = true;
    }

    function next() {
      index = (index + 1) % playlist.length;
      loadCurrent();
    }

    function prev() {
      index = (index - 1 + playlist.length) % playlist.length;
      loadCurrent();
    }

    function togglePlay() {
      if (!player) return;
      if (isPlaying) { player.pauseVideo(); isPlaying = false; }
      else { player.playVideo(); isPlaying = true; }
    }
  </script>
</body>
</html>
